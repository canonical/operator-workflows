name: Charmbuild lint and unit tests

on:
  pull_request:
    paths:
      - charmbuild/**

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charmbuild
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check .
      - name: Run ruff format check
        run: ruff format --check .

  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: charmbuild
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
      - name: Install package and test dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest
        run: pytest

  required_status_checks:
    name: Required Charmbuild Status Checks
    runs-on: ubuntu-latest
    needs:
      - lint
      - unit-test
    if: always() && !cancelled()
    timeout-minutes: 5
    steps:
      - run: |
          [ '${{ needs.lint.result }}' = 'success' ] || (echo lint failed && false)
          [ '${{ needs.unit-test.result }}' = 'success' ] || (echo unit-test failed && false)
